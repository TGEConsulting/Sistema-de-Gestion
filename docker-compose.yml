version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sgc_user
      POSTGRES_PASSWORD: sgc_password
      POSTGRES_DB: gestion_sgc
    ports:
      - "5432:5432"
    volumes:
      - sgc_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgc_user -d gestion_sgc"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sgc_user:sgc_password@db:5432/gestion_sgc?schema=public
      JWT_SECRET: cambia-este-secreto-por-uno-largo-y-aleatorio
      JWT_EXPIRES_IN: 8h
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GCS_PROJECT_ID: ${GCS_PROJECT_ID:-}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GCS_CREDENTIALS_JSON: ${GCS_CREDENTIALS_JSON:-}
      CRON_SECRET: ${CRON_SECRET:-cambia-este-secreto-tambien}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  sgc_db_data:
